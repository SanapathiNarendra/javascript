<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function onClickConvert() {
            debugger;
            var celsius =parseInt(document.getElementById("txtCelsius").value);
            var fahrenheit = (celsius * 9 / 5) + 32;
            document.getElementById("pResult").innerHTML = fahrenheit;
        }
    </script>
</head>
<body>
    <label>Enter the temperature in Celsius</label>
    <input type="number" id="txtCelsius">
    <button id="buttonConvert" onclick="onClickConvert()">Convert to Fahrenheit</button>
    <p id="pResult"></p>    
</body>
</html>
