<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Average Calculator</title>
    <script src="Average.js"></script>
    <link rel="stylesheet" href="styles.css">
   
</head>
<body>
    <div class="averagebox">
        <label for="txtValue1">Value 1:</label>
        <input type="number" id="txtValue1" placeholder="Enter first number"><br>

        <label for="txtValue2">Value 2:</label>
        <input type="number" id="txtValue2" placeholder="Enter second number"><br>

        <label for="txtValue3">Value 3:</label>
        <input type="number" id="txtValue3" placeholder="Enter third number"><br>
        

        <button id="buttonCalculate" onclick="onClickCalculate()">Calculate Average</button><br>
        <p id="pResult">Average: </p>
    </div>

    
</body>
</html>
