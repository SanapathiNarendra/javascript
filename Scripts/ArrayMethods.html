<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array Methods</title>
    <script src="ArrayMethods.js" defer></script>
</head>

<body>

    <h1>Array Methods Example</h1>

    <h2>Current Array:</h2>
    <p id="result"></p>

    <input type="text" id="txtValue" placeholder="Enter value">

    <br><br>

    <button onclick="arrayLength()">Array Length</button>
    <button onclick="arrayToString()">toString()</button>
    <button onclick="arrayAt()">at()</button>
    <button onclick="arrayJoin()">join()</button>
    <button onclick="arrayPop()">pop()</button>
    <button onclick="arrayPush()">push()</button>
    <button onclick="arrayShift()">shift()</button>
    <button onclick="arrayUnshift()">unshift()</button>

    <h2>Result:</h2>
    <p id="pResult"></p>

</body>

</html>
